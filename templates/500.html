<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 Server Error – Singing Bowl Export Desk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body class="font-[Inter] bg-[#F8FAFC] flex items-center justify-center min-h-screen p-6">
  <div class="text-center">
    <div class="w-24 h-24 rounded-3xl bg-red-50 flex items-center justify-center mx-auto mb-6">
      <i data-lucide="server-crash" class="w-12 h-12 text-red-600"></i>
    </div>
    <h1 class="text-6xl font-bold text-gray-200 mb-2">500</h1>
    <h2 class="text-xl font-semibold text-gray-800 mb-3">Server Error</h2>
    <p class="text-gray-500 mb-8">Something went wrong on our end. Please try again.</p>
    <a href="/" class="inline-flex items-center gap-2 bg-green-600 text-white px-6 py-3 rounded-xl font-medium hover:bg-green-700 transition-colors">
      <i data-lucide="home" class="w-4 h-4"></i> Back to Dashboard
    </a>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
